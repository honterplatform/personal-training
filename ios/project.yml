name: LOG
options:
  bundleIdPrefix: com.honterplatform
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
    INFOPLIST_KEY_UIStatusBarStyle: "UIStatusBarStyleDarkContent"
    DEVELOPMENT_ASSET_PATHS: "\"LOG/Preview Content\""
    ENABLE_PREVIEWS: YES

targets:
  LOG:
    type: application
    platform: iOS
    sources:
      - path: LOG
        excludes:
          - "Resources/Fonts/.gitkeep"
    resources:
      - path: LOG/Resources/Fonts
        type: folder
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.honterplatform.log
        INFOPLIST_KEY_CFBundleDisplayName: "LOG"
        INFOPLIST_KEY_NSAppTransportSecurity: ""
        TARGETED_DEVICE_FAMILY: "1"
